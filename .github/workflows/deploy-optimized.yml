name: Deploy to Aliyun (Source Code)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source package
        run: git archive --format=tar.gz -o source.tar.gz HEAD

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "source.tar.gz"
          target: "/tmp"
          timeout: 300s

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          timeout: 600s
          script: |
            set -e

            BASE_DIR="/root/note-gen-docs"
            RELEASES_DIR="$BASE_DIR/releases"
            CURRENT_LINK="$BASE_DIR/current"
            BACKUP_DIR="/root/backups/note-gen-docs"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            RELEASE_DIR="$RELEASES_DIR/$TIMESTAMP"

            echo "🚀 Starting source code deployment..."

            # Create directories
            mkdir -p "$RELEASES_DIR" "$BACKUP_DIR" "$RELEASE_DIR"

            # Backup current deployment
            if [ -f "$CURRENT_LINK/package.json" ]; then
                echo "📦 Creating backup..."
                tar -czf "$BACKUP_DIR/backup_$TIMESTAMP.tar.gz" -C "$CURRENT_LINK" . 2>/dev/null || true
                ls -t $BACKUP_DIR/backup_*.tar.gz | tail -n +6 | xargs -r rm || true
            fi

            # Extract new source into an isolated release directory.
            echo "📂 Extracting source code..."
            tar -xzf /tmp/source.tar.gz -C "$RELEASE_DIR"
            rm /tmp/source.tar.gz

            # Install dependencies
            echo "📦 Installing dependencies..."
            cd "$RELEASE_DIR"
            pnpm install --frozen-lockfile

            # Build project
            echo "🔨 Building project..."
            pnpm build

            # Atomically promote the fully built release, then reload PM2.
            echo "🔄 Reloading application..."
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            if pm2 describe note-gen-docs > /dev/null 2>&1; then
                pm2 reload "$CURRENT_LINK/ecosystem.config.js" --update-env
            else
                pm2 start "$CURRENT_LINK/ecosystem.config.js"
            fi
            pm2 save
            ls -dt "$RELEASES_DIR"/* | tail -n +6 | xargs -r rm -rf

            echo "✅ Deployment completed!"
            pm2 status note-gen-docs

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            echo "🏥 Running health check..."
            for i in {1..30}; do
                if curl -fsS http://127.0.0.1:8080/ > /dev/null && pm2 describe note-gen-docs | grep -q "online"; then
                    echo "✅ Application is running"
                    exit 0
                fi
                sleep 2
            done

            echo "❌ Application failed health check"
            pm2 logs note-gen-docs --lines 100
            exit 1
